apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongodb-svc
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.StatefulSet.label.app }}
  ports:
    - port: {{ .Values.mongoService.port }}
      targetPort: {{ .Values.mongoService.port }}
      protocol: TCP
  clusterIP: {{ .Values.mongoService.clusterIP }}